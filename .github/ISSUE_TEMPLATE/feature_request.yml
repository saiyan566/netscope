name: Feature request
description: Suggest a defensive feature or improvement.
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What defensive workflow does this improve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the CLI flags, output, or workflow you want.
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety considerations
      description: Explain how this stays within authorized defensive use.
    validations:
      required: true
  - type: checkboxes
    id: boundaries
    attributes:
      label: Boundary check
      options:
        - label: This request does not require exploit delivery, evasion, credential attacks, or unauthorized access.
          required: true
