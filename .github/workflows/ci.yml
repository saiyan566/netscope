name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Check Go formatting
        run: test -z "$(gofmt -l cmd)"

      - name: Check Rust formatting
        run: cargo fmt --manifest-path engine/Cargo.toml -- --check

      - name: Test
        run: make test

      - name: Build
        run: make build

      - name: Doctor smoke test
        run: ./build/netscope doctor
